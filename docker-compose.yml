# =============================================================================
# Multi-Agent RevOps Orchestrator - Docker Compose (Local + Dev)
# =============================================================================
version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: revops-postgres
    environment:
      POSTGRES_USER: revops
      POSTGRES_PASSWORD: revops
      POSTGRES_DB: revops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U revops"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: revops-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  revops-orchestrator:
    build: .
    container_name: revops-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://revops:revops@postgres:5432/revops
      - REDIS_URL=redis://redis:6379/0
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - WHATSAPP_ACCESS_TOKEN=${WHATSAPP_ACCESS_TOKEN:-}
      - WHATSAPP_PHONE_NUMBER_ID=${WHATSAPP_PHONE_NUMBER_ID:-}
      - WHATSAPP_RECIPIENT_PHONE=${WHATSAPP_RECIPIENT_PHONE:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - DEMO_MODE=${DEMO_MODE:-false}
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./briefings:/app/briefings
    command: >
      sh -c "
        python -m src.database.seed_data &&
        uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
      "
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
